<table width="100%" cellpadding="0" cellspacing="0" style="background:#f8fafc;padding:32px 16px;font-family:Arial,Helvetica,sans-serif;">
  <tr>
    <td align="center">
      <table width="440" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:16px;border:1px solid #e2e8f0;padding:40px 36px;">
        <tr>
          <td style="font-size:22px;font-weight:bold;color:#0f172a;padding-bottom:24px;">
            Kawan<span style="color:#0e7490;">Tuli</span>
          </td>
        </tr>
        <tr>
          <td style="font-size:18px;font-weight:bold;color:#0f172a;padding-bottom:8px;">
            Verifikasi email kamu
          </td>
        </tr>
        <tr>
          <td style="font-size:14px;color:#64748b;line-height:1.6;padding-bottom:24px;">
            Masukkan kode berikut di halaman pendaftaran KawanTuli untuk mengaktifkan akunmu. Kode berlaku 1 jam.
          </td>
        </tr>
        <tr>
          <td align="center" style="padding-bottom:24px;">
            <div style="background:#ecfeff;border-radius:12px;padding:18px 0;font-size:32px;font-weight:bold;letter-spacing:12px;color:#0e7490;">
              {{ .Token }}
            </div>
          </td>
        </tr>
        <tr>
          <td style="font-size:12px;color:#94a3b8;line-height:1.6;">
            Kalau kamu tidak merasa mendaftar di KawanTuli, abaikan email ini.
          </td>
        </tr>
      </table>
      <table width="440" cellpadding="0" cellspacing="0">
        <tr>
          <td style="font-size:12px;color:#94a3b8;padding-top:16px;" align="center">
            KawanTuli. Platform belajar BISINDO.
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
